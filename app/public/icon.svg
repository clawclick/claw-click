      <stop offset="0%" style="stop-color:#7DE2D1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#45C7B8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1FAFA3;stop-opacity:1" />
