  <!-- C-Claw shape -->
  <path 
    d="M16 4C9.37258 4 4 9.37258 4 16C4 22.6274 9.37258 28 16 28C18.2091 28 20.2841 27.4179 22.0711 26.3957L20.5858 24.9105C19.2076 25.6093 17.6478 26 16 26C10.4772 26 6 21.5228 6 16C6 10.4772 10.4772 6 16 6C21.5228 6 26 10.4772 26 16C26 17.6478 25.6093 19.2076 24.9105 20.5858L26.3957 22.0711C27.4179 20.2841 28 18.2091 28 16C28 9.37258 22.6274 4 16 4Z" 
