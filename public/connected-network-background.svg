<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="nodeGrad1" cx="0.3" cy="0.3">
      <stop offset="0%" stop-color="#444" stop-opacity="0.9"/>
      <stop offset="70%" stop-color="#666" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#888" stop-opacity="0.3"/>
    </radialGradient>
    <radialGradient id="nodeGrad2" cx="0.3" cy="0.3">
      <stop offset="0%" stop-color="#666" stop-opacity="0.7"/>
      <stop offset="70%" stop-color="#888" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#aaa" stop-opacity="0.2"/>
    </radialGradient>
    <radialGradient id="nodeGrad3" cx="0.3" cy="0.3">
      <stop offset="0%" stop-color="#888" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#aaa" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ccc" stop-opacity="0.1"/>
    </radialGradient>
  </defs>
  
  <rect width="100%" height="100%" fill="#f8f9fa"/>

  <!-- Define node positions that will be animated -->
  <g id="networkNodes">
    <!-- Large primary nodes with 3D orbital motion -->
    <g id="node1">
      <circle r="12" fill="url(#nodeGrad1)" cx="200" cy="150">
        <animateTransform attributeName="transform" type="translate"
          values="0,0; 50,30; 80,60; 50,90; 0,80; -30,50; -50,20; -30,-10; 0,0"
          dur="18s" repeatCount="indefinite"/>
      </circle>
    </g>
    
    <g id="node2">
      <circle r="10" fill="url(#nodeGrad1)" cx="500" cy="200">
        <animateTransform attributeName="transform" type="translate"
          values="0,0; -40,60; -80,40; -60,0; -20,-40; 20,-60; 60,-30; 40,20; 0,0"
          dur="22s" repeatCount="indefinite"/>
      </circle>
    </g>
    
    <g id="node3">
      <circle r="14" fill="url(#nodeGrad1)" cx="800" cy="180">
        <animateTransform attributeName="transform" type="translate"
          values="0,0; 30,-50; 70,-30; 90,10; 60,50; 10,70; -30,40; -60,0; 0,0"
          dur="20s" repeatCount="indefinite"/>
      </circle>
    </g>
    
    <g id="node4">
      <circle r="9" fill="url(#nodeGrad1)" cx="350" cy="400">
        <animateTransform attributeName="transform" type="translate"
          values="0,0; 60,20; 40,60; 0,80; -40,60; -70,20; -50,-20; -10,-50; 0,0"
          dur="25s" repeatCount="indefinite"/>
      </circle>
    </g>
    
    <g id="node5">
      <circle r="11" fill="url(#nodeGrad1)" cx="950" cy="350">
        <animateTransform attributeName="transform" type="translate"
          values="0,0; -50,40; -30,80; 10,60; 50,30; 70,-10; 40,-50; 10,-60; 0,0"
          dur="19s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Medium nodes -->
    <g id="node6">
      <circle r="6" fill="url(#nodeGrad2)" cx="150" cy="350">
        <animateTransform attributeName="transform" type="translate"
          values="0,0; 40,50; 70,30; 50,0; 20,-30; -10,-50; -40,-30; -30,10; 0,0"
          dur="16s" repeatCount="indefinite"/>
      </circle>
    </g>
    
    <g id="node7">
      <circle r="7" fill="url(#nodeGrad2)" cx="650" cy="120">
        <animateTransform attributeName="transform" type="translate"
          values="0,0; -30,40; -60,20; -40,-10; -10,-40; 20,-50; 50,-20; 30,20; 0,0"
          dur="24s" repeatCount="indefinite"/>
      </circle>
    </g>
    
    <g id="node8">
      <circle r="8" fill="url(#nodeGrad2)" cx="750" cy="450">
        <animateTransform attributeName="transform" type="translate"
          values="0,0; 50,-30; 30,-60; 0,-50; -30,-30; -50,0; -30,40; 10,50; 0,0"
          dur="21s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Small background nodes -->
    <g id="node9">
      <circle r="4" fill="url(#nodeGrad3)" cx="100" cy="250">
        <animateTransform attributeName="transform" type="translate"
          values="0,0; 30,20; 20,40; 0,30; -20,20; -30,0; -20,-20; 0,-30; 0,0"
          dur="30s" repeatCount="indefinite"/>
      </circle>
    </g>
    
    <g id="node10">
      <circle r="3" fill="url(#nodeGrad3)" cx="1050" cy="200">
        <animateTransform attributeName="transform" type="translate"
          values="0,0; -20,30; -40,15; -25,0; -10,-25; 15,-30; 35,-15; 20,15; 0,0"
          dur="28s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <!-- Dynamic connecting lines that stretch with node movement -->
  <g stroke="#999" stroke-width="1.5" fill="none" opacity="0.6">
    <!-- Primary connections -->
    <line x1="200" y1="150" x2="500" y2="200">
      <animate attributeName="x1" 
        values="200; 250; 280; 250; 200; 170; 150; 170; 200" 
        dur="18s" repeatCount="indefinite"/>
      <animate attributeName="y1" 
        values="150; 180; 210; 240; 230; 200; 170; 140; 150" 
        dur="18s" repeatCount="indefinite"/>
      <animate attributeName="x2" 
        values="500; 460; 420; 440; 480; 520; 560; 540; 500" 
        dur="22s" repeatCount="indefinite"/>
      <animate attributeName="y2" 
        values="200; 260; 240; 200; 160; 140; 170; 220; 200" 
        dur="22s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4; 0.8; 0.6; 0.4" dur="10s" repeatCount="indefinite"/>
    </line>
    
    <line x1="500" y1="200" x2="800" y2="180">
      <animate attributeName="x1" 
        values="500; 460; 420; 440; 480; 520; 560; 540; 500" 
        dur="22s" repeatCount="indefinite"/>
      <animate attributeName="y1" 
        values="200; 260; 240; 200; 160; 140; 170; 220; 200" 
        dur="22s" repeatCount="indefinite"/>
      <animate attributeName="x2" 
        values="800; 830; 870; 890; 860; 810; 770; 740; 800" 
        dur="20s" repeatCount="indefinite"/>
      <animate attributeName="y2" 
        values="180; 130; 150; 190; 230; 180; 220; 180; 180" 
        dur="20s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3; 0.7; 0.5; 0.3" dur="12s" repeatCount="indefinite"/>
    </line>
    
    <line x1="200" y1="150" x2="350" y2="400">
      <animate attributeName="x1" 
        values="200; 250; 280; 250; 200; 170; 150; 170; 200" 
        dur="18s" repeatCount="indefinite"/>
      <animate attributeName="y1" 
        values="150; 180; 210; 240; 230; 200; 170; 140; 150" 
        dur="18s" repeatCount="indefinite"/>
      <animate attributeName="x2" 
        values="350; 410; 390; 350; 310; 280; 300; 340; 350" 
        dur="25s" repeatCount="indefinite"/>
      <animate attributeName="y2" 
        values="400; 420; 460; 480; 460; 420; 380; 350; 400" 
        dur="25s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2; 0.6; 0.4; 0.2" dur="15s" repeatCount="indefinite"/>
    </line>
    
    <line x1="800" y1="180" x2="950" y2="350">
      <animate attributeName="x1" 
        values="800; 830; 870; 890; 860; 810; 770; 740; 800" 
        dur="20s" repeatCount="indefinite"/>
      <animate attributeName="y1" 
        values="180; 130; 150; 190; 230; 180; 220; 180; 180" 
        dur="20s" repeatCount="indefinite"/>
      <animate attributeName="x2" 
        values="950; 900; 920; 960; 1000; 1020; 990; 960; 950" 
        dur="19s" repeatCount="indefinite"/>
      <animate attributeName="y2" 
        values="350; 390; 430; 410; 380; 340; 330; 340; 350" 
        dur="19s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4; 0.8; 0.5; 0.4" dur="11s" repeatCount="indefinite"/>
    </line>
    
    <line x1="350" y1="400" x2="750" y2="450">
      <animate attributeName="x1" 
        values="350; 410; 390; 350; 310; 280; 300; 340; 350" 
        dur="25s" repeatCount="indefinite"/>
      <animate attributeName="y1" 
        values="400; 420; 460; 480; 460; 420; 380; 350; 400" 
        dur="25s" repeatCount="indefinite"/>
      <animate attributeName="x2" 
        values="750; 800; 780; 750; 720; 700; 720; 760; 750" 
        dur="21s" repeatCount="indefinite"/>
      <animate attributeName="y2" 
        values="450; 420; 390; 400; 420; 450; 490; 500; 450" 
        dur="21s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3; 0.7; 0.4; 0.3" dur="13s" repeatCount="indefinite"/>
    </line>

    <!-- Secondary web connections -->
    <line x1="150" y1="350" x2="350" y2="400" stroke-width="1" opacity="0.4">
      <animate attributeName="x1" 
        values="150; 190; 220; 200; 170; 140; 110; 120; 150" 
        dur="16s" repeatCount="indefinite"/>
      <animate attributeName="y1" 
        values="350; 400; 380; 350; 320; 340; 320; 330; 350" 
        dur="16s" repeatCount="indefinite"/>
      <animate attributeName="x2" 
        values="350; 410; 390; 350; 310; 280; 300; 340; 350" 
        dur="25s" repeatCount="indefinite"/>
      <animate attributeName="y2" 
        values="400; 420; 460; 480; 460; 420; 380; 350; 400" 
        dur="25s" repeatCount="indefinite"/>
    </line>
    
    <line x1="650" y1="120" x2="800" y2="180" stroke-width="1" opacity="0.4">
      <animate attributeName="x1" 
        values="650; 620; 590; 610; 640; 670; 700; 680; 650" 
        dur="24s" repeatCount="indefinite"/>
      <animate attributeName="y1" 
        values="120; 160; 140; 110; 80; 70; 100; 140; 120" 
        dur="24s" repeatCount="indefinite"/>
      <animate attributeName="x2" 
        values="800; 830; 870; 890; 860; 810; 770; 740; 800" 
        dur="20s" repeatCount="indefinite"/>
      <animate attributeName="y2" 
        values="180; 130; 150; 190; 230; 180; 220; 180; 180" 
        dur="20s" repeatCount="indefinite"/>
    </line>

    <line x1="100" y1="250" x2="150" y2="350" stroke-width="0.8" opacity="0.3">
      <animate attributeName="x1" 
        values="100; 130; 120; 100; 80; 70; 80; 100; 100" 
        dur="30s" repeatCount="indefinite"/>
      <animate attributeName="y1" 
        values="250; 270; 290; 280; 270; 250; 230; 220; 250" 
        dur="30s" repeatCount="indefinite"/>
      <animate attributeName="x2" 
        values="150; 190; 220; 200; 170; 140; 110; 120; 150" 
        dur="16s" repeatCount="indefinite"/>
      <animate attributeName="y2" 
        values="350; 400; 380; 350; 320; 340; 320; 330; 350" 
        dur="16s" repeatCount="indefinite"/>
    </line>
  </g>
  
  <!-- Additional web strands -->
  <g stroke="#bbb" stroke-width="0.8" fill="none" opacity="0.3">
    <line x1="950" y1="350" x2="1050" y2="200">
      <animate attributeName="x1" 
        values="950; 900; 920; 960; 1000; 1020; 990; 960; 950" 
        dur="19s" repeatCount="indefinite"/>
      <animate attributeName="y1" 
        values="350; 390; 430; 410; 380; 340; 330; 340; 350" 
        dur="19s" repeatCount="indefinite"/>
      <animate attributeName="x2" 
        values="1050; 1030; 1010; 1025; 1040; 1065; 1085; 1070; 1050" 
        dur="28s" repeatCount="indefinite"/>
      <animate attributeName="y2" 
        values="200; 230; 215; 200; 175; 170; 185; 215; 200" 
        dur="28s" repeatCount="indefinite"/>
    </line>
    
    <line x1="500" y1="200" x2="650" y2="120">
      <animate attributeName="x1" 
        values="500; 460; 420; 440; 480; 520; 560; 540; 500" 
        dur="22s" repeatCount="indefinite"/>
      <animate attributeName="y1" 
        values="200; 260; 240; 200; 160; 140; 170; 220; 200" 
        dur="22s" repeatCount="indefinite"/>
      <animate attributeName="x2" 
        values="650; 620; 590; 610; 640; 670; 700; 680; 650" 
        dur="24s" repeatCount="indefinite"/>
      <animate attributeName="y2" 
        values="120; 160; 140; 110; 80; 70; 100; 140; 120" 
        dur="24s" repeatCount="indefinite"/>
    </line>
  </g>
</svg>