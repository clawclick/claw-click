<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient matching mint/teal brand -->
    <linearGradient id="mintGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7DE2D1"/>
      <stop offset="50%" stop-color="#45C7B8"/>
      <stop offset="100%" stop-color="#1FAFA3"/>
    </linearGradient>

    <!-- Pixel jitter filter -->
    <filter id="pixelMove">
      <feTurbulence type="fractalNoise" baseFrequency="0.01" numOctaves="2" result="noise">
        <animate attributeName="baseFrequency"
                 values="0.01;0.012;0.009;0.011;0.01"
                 dur="4s"
                 repeatCount="indefinite"/>
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2"/>
    </filter>

    <!-- Scanline effect -->
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="rgba(0,0,0,0.08)"/>
    </pattern>
  </defs>

  <!-- Text -->
  <g filter="url(#pixelMove)">
    <text x="50%" y="110" text-anchor="middle"
          font-family="Orbitron, Arial, sans-serif"
          font-size="90"
          letter-spacing="6"
          fill="url(#mintGrad)">
      AUTONOMOUS
    </text>
  </g>

  <!-- Overlay scanlines -->
  <rect width="100%" height="100%" fill="url(#scanlines)" opacity="0.3"/>

  <!-- subtle glow pulse -->
  <style>
    text {
      filter: drop-shadow(0 0 6px #2EE6D6);
      animation: glow 3s ease-in-out infinite;
    }
    @keyframes glow {
      0% { filter: drop-shadow(0 0 6px #2EE6D6); }
      50% { filter: drop-shadow(0 0 14px #2EE6D6); }
      100% { filter: drop-shadow(0 0 6px #2EE6D6); }
    }
  </style>
</svg>
